# Based on https://github.com/Unsandboxed/scratch-blocks/blob/develop/.github/workflows/meow.yml
# Versioning based on my (miyo / yuri-kiss) gallery and local program versions.
name: Build and push
on:
  workflow_dispatch:
concurrency:
  group: "build"
  cancel-in-progress: true
permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          ref: 'develop-builds'
      - name: Install node.js
        uses: actions/setup-node@26961cf329f22f6837d5f54c3efd76b480300ace #v4
        with:
          node-version: '21'
          cache: npm
      - name: Install python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.11.2'
      - name: Install java
        uses: actions/setup-java@v4.4.0
        with:
          java-version: 17
          distribution: adopt-hotspot
          java-package: jre
      - name: Setup Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git merge develop
      - name: CI and prepublish
        run: |
          npm ci
      - name: Push build
        run: |
          git add .
          git commit -m "The blocks of scratch!!!"
          git push develop-builds
          
